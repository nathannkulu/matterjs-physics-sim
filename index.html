<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Simulation - Matter.js</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="toolbar">
      <button data-shape="box" class="active">⬛ Box</button>
      <button data-shape="circle">● Circle</button>
      <button data-shape="polygon">⬡ Polygon</button>
      <button data-shape="ragdoll">🦴 Ragdoll</button>
      <span id="count">Bodies: 0</span>
      <button id="clear-btn">🗑️ Clear All</button>
    </div>
    <div id="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
